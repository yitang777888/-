<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>现代汉语 · 知识背诵思维导图</title>
<style>
:root{--ind:22px;--fg:#1f2328;--mut:#6a6f76;--line:#e3e6ea;--bg:#ffffff;--panel:#f6f8fa;--accent:#2f6fed}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--fg);background:#fafbfc;font-size:16px;line-height:1.6;-webkit-text-size-adjust:100%}
.wrap{max-width:1000px;margin:0 auto;padding:16px}
h1{font-size:20px;font-weight:600;margin:0 0 4px}
.sub{color:var(--mut);font-size:13px;margin:0 0 14px}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px 12px;min-width:96px}
.stat .k{font-size:12px;color:var(--mut)}
.stat .v{font-size:18px;font-weight:600;margin-top:2px}
.bar{height:7px;background:#e9edf2;border-radius:5px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--accent);width:0}
.tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.tools input[type=search]{flex:1;min-width:140px;height:36px;border:1px solid var(--line);border-radius:9px;padding:0 12px;font-size:14px;background:var(--bg)}
.btn{height:34px;border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:0 12px;font-size:13px;color:var(--fg);cursor:pointer}
.btn:hover{background:var(--panel)}
.btn.on{border-color:var(--accent);color:var(--accent);background:#eef3fe}
.node{padding-left:var(--ind)}
.node>.kids{display:none}
.node.open>.kids{display:block}
.row{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-radius:8px}
.row:hover{background:var(--panel)}
.chev{flex:none;width:18px;text-align:center;color:var(--mut);cursor:pointer;user-select:none;margin-top:1px}
.node.open>.row>.chev{transform:rotate(90deg)}
.chev.empty{visibility:hidden}
.chk{flex:none;width:18px;height:18px;border:1.5px solid #b9c0c8;border-radius:5px;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;line-height:1}
.chk.on{background:var(--accent);border-color:var(--accent)}
.lbl{cursor:pointer;flex:1;min-width:0}
.lbl .nm{word-break:break-word}
.b0>.row>.lbl .nm{font-weight:600}
.star{flex:none;cursor:pointer;color:#d7dbe0;font-size:15px;margin-top:1px;user-select:none}
.star.on{color:#f5a623}
.cnt{font-size:12px;color:var(--mut);font-weight:400;margin-left:6px}
.detail{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin:2px 0 6px;white-space:pre-wrap;word-break:break-word;font-size:15px;line-height:1.7}
.tw{overflow-x:auto;margin-top:8px}
table{border-collapse:collapse;font-size:13px;min-width:100%}
th,td{border:1px solid var(--line);padding:5px 8px;text-align:left;vertical-align:top;white-space:nowrap}
th{background:#eef1f4;font-weight:600}
.qz{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:6px 0}
.qzbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.tag{font-size:11px;border-radius:6px;padding:2px 7px;border:1px solid var(--line);color:var(--mut)}
.qitem{border-top:1px dashed var(--line);padding:9px 0}
.qitem .q{font-size:15px}
.ans{display:none;margin-top:7px;background:#eef7f0;border:1px solid #cfe8d6;border-radius:8px;padding:8px 10px;font-size:14px;white-space:pre-wrap;word-break:break-word}
.qitem.show .ans{display:block}
.mini{height:28px;border:1px solid var(--line);background:var(--bg);border-radius:7px;padding:0 10px;font-size:12px;cursor:pointer}
.mini:hover{background:var(--panel)}
.gd{margin-top:6px;display:flex;gap:6px}
.gd .right{color:#1a7f37;border-color:#bce3c5}
.gd .wrong{color:#cf222e;border-color:#f3c6cb}
.qitem.g-right{background:#f2fbf4}.qitem.g-wrong{background:#fef4f4}
.bcol-绪论{border-left:3px solid #8a93a0}
.bcol-语音{border-left:3px solid #2f6fed}
.bcol-文字{border-left:3px solid #1d9e75}
.bcol-词汇{border-left:3px solid #c07b16}
.bcol-语法{border-left:3px solid #6a4ad0}
.bcol-修辞{border-left:3px solid #c0398a}
.node.b0{border-radius:8px;margin-top:8px;padding-left:10px}
.hide{display:none!important}
.hl{background:#fff3b0}
.io{display:none;margin-top:10px}
.io textarea{width:100%;height:90px;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px;font-family:monospace}
#navbar{position:fixed;left:0;right:0;bottom:0;display:flex;background:#fff;border-top:2px solid #1f2328;z-index:50}
#navbar button{flex:1;height:50px;border:0;border-right:1px solid var(--line);background:#fff;color:#1f2328;font-size:15px;font-family:inherit;cursor:pointer}
#navbar button:last-child{border-right:0;color:#fff;background:var(--accent)}
#navbar button:active{opacity:.6}
.node.focus>.row{outline:2px solid #1f2328;background:#fff7cc}
.node.focus{scroll-margin-top:12px}
body{padding-bottom:62px}
@media(max-width:640px){:root{--ind:13px}.wrap{padding:10px}h1{font-size:18px}.detail,.qitem .q,.lbl .nm{font-size:15px}#navbar button{font-size:14px;height:48px}}
</style>
</head>
<body>
<div class="wrap">
<h1>现代汉语 · 知识背诵思维导图</h1>
<p class="sub">点节点逐层展开 · 点末级看要点 · 勾选「已背」记录进度 · 每章可做巩固练习</p>
<div class="stats">
  <div class="stat" style="flex:1;min-width:200px"><div class="k">总背诵进度 <span id="ov-txt"></span></div><div class="bar"><i id="ov-bar"></i></div></div>
  <div class="stat"><div class="k">今日新背</div><div class="v"><span id="today">0</span> 条</div></div>
  <div class="stat"><div class="k">连续打卡</div><div class="v"><span id="streak">0</span> 天</div></div>
</div>
<div class="tools">
  <input type="search" id="search" placeholder="搜索知识点…">
  <button class="btn" data-lv="1">展开一级</button>
  <button class="btn" data-lv="2">二级</button>
  <button class="btn" data-lv="3">三级</button>
  <button class="btn" id="expand-all">全部展开</button>
  <button class="btn" id="collapse-all">全部收起</button>
  <button class="btn" id="f-star">只看★</button>
  <button class="btn" id="f-undone">只看未背</button>
  <button class="btn" id="io-btn">导出/导入进度</button>
</div>
<div class="io" id="io-box">
  <div style="font-size:13px;color:var(--mut);margin-bottom:6px">换设备同步：在原设备点「复制进度码」，把这段文字发到新设备，粘贴到下框后点「导入」。</div>
  <textarea id="io-text" placeholder="进度码"></textarea>
  <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn" id="io-export">复制进度码</button>
    <button class="btn" id="io-import">导入进度码</button>
    <button class="btn" id="io-reset" style="color:#cf222e">清空全部进度</button>
  </div>
</div>
<div id="tree"></div>
<p class="sub" style="margin-top:18px">进度仅保存在本设备浏览器中。换设备请用「导出/导入进度」。底部「下一条」按钮适合墨水屏逐条翻阅。</p>
</div>
<div id="navbar">
  <button id="nav-top" title="回到顶部">⤒ 顶部</button>
  <button id="nav-prev" title="上一个知识点">‹ 上一条</button>
  <button id="nav-next" title="下一个知识点">下一条 ›</button>
  <button id="nav-done" title="标为已背并跳到下一条">✓ 已背并下一条</button>
</div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
